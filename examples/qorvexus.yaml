data_dir: ./.qorvexus
models:
  primary:
    provider: openai-compatible
    base_url: https://api.openai.com/v1
    api_key: ""
    model: gpt-4.1
agent:
  default_model: primary
tools:
  allow_command_execution: true
scheduler:
  enabled: true
memory:
  enabled: true
queue:
  enabled: true
  worker_enabled: true
web:
  enabled: true
  address: 127.0.0.1:7788
identity:
  owner_aliases:
    - owner
social:
  enabled: true
  allowed_channels:
    - telegram
  telegram_mode: polling
  telegram_bot_token: ""
self:
  enabled: true
  allow_config_edits: true
  allow_skill_writes: true
audit:
  enabled: true
