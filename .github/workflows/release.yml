name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then ext=".exe"; fi
          bin="qorvexus-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags="-s -w" -o "dist/${bin}" ./cmd/qorvexus

      - name: Package artifact
        run: |
          mkdir -p release
          base="qorvexus-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cd dist && zip "../release/${base}.zip" "${base}.exe"
          else
            tar -C dist -czf "release/${base}.tar.gz" "${base}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qorvexus-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
